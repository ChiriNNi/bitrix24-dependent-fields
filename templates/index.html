<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Зависимые поля Bitrix24</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="panel bitrix-section" aria-labelledby="app-title">
        <div class="panel-header">
          <div class="section-title-wrap">
            <h1 id="app-title">Зависимые поля</h1>
            <span class="section-pencil" aria-hidden="true"></span>
          </div>
          <span class="section-edit">изменить</span>
          <span class="status" id="connection-status">Загрузка</span>
        </div>

        <section class="button-mode" id="button-mode" hidden>
          <div class="summary-list">
            <div>
              <span>Адрес</span>
              <strong id="summary-address">не заполнено</strong>
            </div>
            <div>
              <span>Город</span>
              <strong id="summary-city">не заполнено</strong>
            </div>
            <div>
              <span>ИП</span>
              <strong id="summary-ip">не заполнено</strong>
            </div>
            <div>
              <span>Ответственное лицо</span>
              <strong id="summary-responsible">не заполнено</strong>
            </div>
          </div>
          <button type="button" class="button primary full-width" id="open-form-button">Открыть форму</button>
        </section>

        <form id="dependent-fields-form" class="field-grid" hidden>
          <label class="field">
            <span>Клиент</span>
            <div class="lookup" id="client-lookup">
              <input id="client-combobox-field" type="search" autocomplete="off" placeholder="Название компании">
              <select id="client-field" name="client" class="native-value" tabindex="-1" aria-hidden="true">
                <option value="">Любой клиент</option>
              </select>
              <div class="lookup-menu" id="client-options" hidden></div>
            </div>
          </label>

          <label class="field">
            <span>Город</span>
            <select id="city-field" name="city">
              <option value="">Любой город</option>
            </select>
          </label>

          <label class="field full-row">
            <span>Адрес объекта инфо</span>
            <div class="lookup" id="address-lookup">
              <input id="address-combobox-field" type="search" autocomplete="off" placeholder="Улица, ТРЦ, объект или часть адреса">
              <select id="address-field" name="address" class="native-value" tabindex="-1" aria-hidden="true">
                <option value="">Загрузка адресов...</option>
              </select>
              <div class="lookup-menu" id="address-options" hidden></div>
            </div>
          </label>

          <label class="field">
            <span>Наименование ИП инфо</span>
            <input id="ip-name-field" name="ipName" type="text" readonly placeholder="Заполнится по выбранному адресу">
          </label>

          <label class="field">
            <span>Ответственное лицо ИП инфо</span>
            <input id="ip-responsible-field" name="ipResponsible" type="text" readonly placeholder="Заполнится по выбранному адресу">
          </label>

          <div class="actions">
            <button type="button" class="button secondary" id="reset-button">Очистить</button>
            <button type="submit" class="button primary" id="save-button">Сохранить в сделку</button>
          </div>
        </form>

        <div class="result" id="result-panel" hidden>
          <div class="result-header">
            <strong>Результат</strong>
            <button type="button" class="link-button" id="close-result-button">Закрыть</button>
          </div>
          <pre id="result-output"></pre>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
